<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Tidy Tails</title>
    <style>
      /* Tenant-neutral offline fallback. Inline styles only: this page must
         render with zero network. Colors mirror app/globals.css tokens. */
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f4f3f7;
        color: #1c1b22;
        display: flex;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      main { max-width: 22rem; }
      .badge {
        width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 16px;
        background: #6d28d9; color: #fff; display: flex; align-items: center;
        justify-content: center; font-size: 28px; font-weight: 800;
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { font-size: 0.9375rem; color: #5c5a68; margin: 0 0 20px; line-height: 1.5; }
      button {
        font: inherit; font-weight: 600; color: #fff; background: #6d28d9;
        border: 0; border-radius: 12px; padding: 12px 24px; min-height: 44px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge" aria-hidden="true">TT</div>
      <h1>You&rsquo;re offline</h1>
      <p>This page isn&rsquo;t available without a connection. Recently viewed pages may still open from the app&rsquo;s cache.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
